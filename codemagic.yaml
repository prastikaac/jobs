workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60

    environment:
      xcode: latest
      node: latest

    scripts:
      - name: Install dependencies
        script: |
          cd App
          npm install
          npx cap sync ios

      - name: Build iOS app for simulator
        script: |
          cd App/ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            build

      - name: Package simulator app
        script: |
          cd App/ios/App/build/Build/Products/Debug-iphonesimulator
          zip -r App.app.zip App.app

    artifacts:
      - App/ios/App/build/Build/Products/Debug-iphonesimulator/App.app.zip

    publishing:
      app_preview: true