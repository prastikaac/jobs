workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60

    environment:
      xcode: latest
      node: latest

    scripts:
      - name: Install dependencies
        script: |
          cd App
          npm install
          npx cap sync ios

      - name: Build iOS app
        script: |
          cd App/ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            build