workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60

    environment:
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install

      - name: Build iOS app
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release