name: Change Job Category

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Exact Job ID (e.g. 'sales-manager-1234abcd')"
        required: true
        type: string
      new_category:
        description: "New Category Slug"
        required: true
        type: choice
        options:
          - cleaning-and-facility-services
          - healthcare
          - social-care-services
          - transportation-and-logistics
          - warehousing-and-storage
          - construction
          - installation-and-maintenance
          - industry-manufacturing-and-production
          - information-technology
          - engineering-and-design
          - technical-services
          - food-and-restaurant
          - education
          - hospitality-and-tourism
          - energy-and-utilities
          - retail-and-wholesale
          - customer-support-and-service
          - sales-and-marketing
          - general-labor-and-manual-work
          - business-and-administration
          - human-resources
          - quality-assurance-and-inspection
          - accounting-and-finance
          - consulting-and-coaching
          - property-and-real-estate
          - research-and-development
          - pharmaceutical-and-biotechnology
          - environment-and-sustainability
          - security-and-safety
          - wellness-and-beauty-care
          - ecommerce-and-digital-business
          - media-and-journalism
          - culture-and-arts
          - agriculture-forestry-and-fisheries
          - government-and-public-sector
          - law-and-legal-services
          - management-and-leadership
          - aviation-and-airport-services
          - military-and-defense
          - gaming-and-sports
          - other

permissions:
  contents: write

jobs:
  change-category:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install beautifulsoup4 python-dotenv

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply Category Change
        run: |
          python scraper/action_change_category.py "${{ github.event.inputs.job_id }}" "${{ github.event.inputs.new_category }}"
