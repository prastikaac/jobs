name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: App

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        run: npm install

      - name: Copy web assets to www/
        run: |
          mkdir -p www/js
          cp *.html www/
          cp js/* www/js/

      - name: Run Capacitor Sync for Android
        run: npx cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Android APK (Debug)
        working-directory: App/android
        run: ./gradlew assembleDebug --stacktrace --warning-mode all

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FindJobsInFinland-Android-APK
          path: App/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
